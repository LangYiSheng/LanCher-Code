provider:
  # 可选: openai | claude
  protocol: openai
  model: gpt-4.1-mini
  base_url: https://api.openai.com/v1
  api_key: ${OPENAI_API_KEY}
  timeout_seconds: 60

  thinking:
    enabled: false
    budget_tokens: 2048

ui:
  show_timestamps: false
  show_thinking_status: true

runtime:
  tool_loop_limit: 50
  unknown_tool_streak_limit: 3
  plan_file_path: ./.lancher/plan.md
  permission_mode: default
